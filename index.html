<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Block Game Neon Extreme</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background: radial-gradient(circle at top,#0a0f2a,#02030a);
  overflow:hidden;
  font-family:Arial;
  color:white;
  text-align:center;
}

h1{margin:10px;font-size:30px;}

#hud{
  display:flex;
  justify-content:center;
  gap:25px;
  font-size:18px;
  margin-bottom:8px;
}

canvas{
  display:block;
  margin:auto;
  border-radius:12px;
  border:2px solid rgba(255,255,255,0.15);
  box-shadow:0 0 40px rgba(0,255,255,0.1);
  background:linear-gradient(#050816,#02030a);
}

#tip{opacity:0.7;margin-top:8px;font-size:14px;}
</style>
</head>
<body>

<h1>⚡ Block Game EXTREME</h1>
<div id="hud">Scor: 0 | Mod: Cube</div>
<canvas id="game" width="900" height="450"></canvas>
<div id="tip">Space / Hold = control • Diferite moduri + portaluri</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const hud=document.getElementById("hud");

let score=0;
let speed=6;
let frame=0;
let gameOver=false;

const keys={};

const player={
  x:120,
  y:300,
  w:38,
  h:38,
  vy:0,
  gravity:0.75,
  jump:-12,
  mode:"cube",
  rot:0
};

let obstacles=[];
let portals=[];
let particles=[];

// INPUT
addEventListener("keydown",e=>keys[e.code]=true);
addEventListener("keyup",e=>keys[e.code]=false);

canvas.addEventListener("click",()=>{
  if(gameOver)location.reload();
});

// SPAWN OBSTACLES (SPIKES STYLE)
function spawnSpike(){
  obstacles.push({
    x:canvas.width+20,
    y:370,
    type:"spike",
    w:30,
    h:35
  });
}

function spawnBlock(){
  obstacles.push({
    x:canvas.width+20,
    y:340,
    type:"block",
    w:40+Math.random()*30,
    h:40+Math.random()*40
  });
}

// PORTALS (MODE CHANGE)
function spawnPortal(){
  const modes=["cube","ship","wave"];
  portals.push({
    x:canvas.width+50,
    y:250,
    r:18,
    mode:modes[Math.floor(Math.random()*modes.length)]
  });
}

// PARTICLES
function burst(x,y,color){
  for(let i=0;i<10;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*4,
      vy:(Math.random()-0.5)*4,
      life:30,
      color
    });
  }
}

// PLAYER DRAW
function drawPlayer(){
  ctx.save();
  ctx.translate(player.x+19,player.y+19);

  if(player.mode!=="ship") player.rot+=0.2;
  else player.rot*=0.9;

  ctx.rotate(player.rot);

  // glow
  ctx.shadowBlur=18;
  ctx.shadowColor="#00f6ff";

  if(player.mode==="cube"){
    let g=ctx.createLinearGradient(-20,-20,20,20);
    g.addColorStop(0,"#00f6ff");
    g.addColorStop(1,"#0044ff");
    ctx.fillStyle=g;
    ctx.fillRect(-19,-19,38,38);
  }

  if(player.mode==="ship"){
    ctx.fillStyle="#ffcc00";
    ctx.beginPath();
    ctx.moveTo(-18,18);
    ctx.lineTo(20,0);
    ctx.lineTo(-18,-18);
    ctx.closePath();
    ctx.fill();
  }

  if(player.mode==="wave"){
    ctx.strokeStyle="#ff00ff";
    ctx.lineWidth=4;
    ctx.beginPath();
    ctx.moveTo(-18,18);
    ctx.lineTo(0,-18);
    ctx.lineTo(18,18);
    ctx.stroke();
  }

  ctx.restore();
}

// SPIKE DRAW (GEOMETRY DASH STYLE)
function drawSpike(o){
  ctx.fillStyle="#ff3355";
  ctx.beginPath();
  ctx.moveTo(o.x,o.y+o.h);
  ctx.lineTo(o.x+o.w/2,o.y);
  ctx.lineTo(o.x+o.w,o.y+o.h);
  ctx.closePath();
  ctx.fill();
}

// UPDATE PLAYER
function updatePlayer(){

  if(player.mode==="cube"){
    player.vy+=player.gravity;
    player.y+=player.vy;

    if(keys["Space"] && player.y>=300){
      player.vy=player.jump;
      burst(player.x,player.y,"cyan");
    }

    if(player.y>300){player.y=300;player.vy=0;}
  }

  if(player.mode==="ship"){
    if(keys["Space"]) player.y-=6;
    else player.y+=4;
  }

  if(player.mode==="wave"){
    if(keys["Space"]) player.y-=7;
    else player.y+=7;
  }

  if(player.y<0)player.y=0;
  if(player.y>420)gameOver=true;
}

// UPDATE WORLD
function updateWorld(){

  if(Math.random()<0.03) spawnSpike();
  if(Math.random()<0.02) spawnBlock();
  if(Math.random()<0.004) spawnPortal();

  obstacles.forEach(o=>o.x-=speed);
  portals.forEach(p=>p.x-=speed);

  // COLLISION
  obstacles.forEach(o=>{
    if(player.x<o.x+o.w && player.x+38>o.x && player.y<o.y+o.h && player.y+38>o.y){
      gameOver=true;
      burst(player.x,player.y,"red");
    }
  });

  // PORTAL MODE CHANGE
  portals.forEach(p=>{
    let dx=player.x-p.x;
    let dy=player.y-p.y;
    if(Math.sqrt(dx*dx+dy*dy)<30){
      player.mode=p.mode;
      burst(player.x,player.y,"purple");
    }
  });

  obstacles=obstacles.filter(o=>o.x>-50);
  portals=portals.filter(p=>p.x>-50);
}

// PARTICLES
function updateParticles(){
  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;
    p.life--;
  });
  particles=particles.filter(p=>p.life>0);
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x,p.y,3,3);
  });
}

// DRAW WORLD
function drawWorld(){

  // ground
  ctx.fillStyle="#0a0f1f";
  ctx.fillRect(0,380,canvas.width,70);

  // spikes + blocks
  obstacles.forEach(o=>{
    if(o.type==="spike") drawSpike(o);
    else{
      ctx.shadowBlur=10;
      ctx.shadowColor="#ff0044";
      ctx.fillStyle="#ff2a6d";
      ctx.fillRect(o.x,o.y,o.w,o.h);
    }
  });

  // portals
  portals.forEach(p=>{
    ctx.shadowBlur=15;
    ctx.strokeStyle="#aa55ff";
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.stroke();
  });
}

// HUD
function updateHUD(){
  let m="Cube";
  if(player.mode==="ship")m="Ship";
  if(player.mode==="wave")m="Wave";
  hud.textContent=`Scor: ${score} | Mod: ${m}`;
}

// LOOP
function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!gameOver){
    frame++; score++;

    if(frame%70===0)spawnSpike();
    if(frame%120===0)spawnBlock();

    updatePlayer();
    updateWorld();
    updateParticles();

    drawWorld();
    drawParticles();
    drawPlayer();

    updateHUD();

    requestAnimationFrame(loop);
  }else{
    ctx.fillStyle="white";
    ctx.font="40px Arial";
    ctx.fillText("GAME OVER",320,200);
    ctx.font="20px Arial";
    ctx.fillText("Click pentru restart",320,240);
  }
}

loop();
</script>

</body>
</html>
