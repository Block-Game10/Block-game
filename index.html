<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Block Game Neon</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: radial-gradient(circle at top, #1a1f3a, #05060f);
      overflow:hidden;
      font-family: Arial, sans-serif;
      color:white;
      text-align:center;
    }

    h1 { margin-top:10px; font-size:32px; }

    #hud {
      display:flex;
      justify-content:center;
      gap:30px;
      font-size:18px;
      margin-bottom:8px;
    }

    canvas {
      display:block;
      margin:0 auto;
      border-radius:14px;
      border:2px solid rgba(255,255,255,0.2);
      box-shadow: 0 0 30px rgba(0,255,255,0.15);
      background: linear-gradient(#050816, #02030a);
    }

    #hint { margin-top:8px; opacity:0.7; font-size:14px; }
  </style>
</head>
<body>

<h1>⚡ Block Game Neon</h1>
<div id="hud">Scor: 0 | Mod: Cub</div>
<canvas id="game" width="900" height="450"></canvas>
<div id="hint">Space = jump • Click = restart</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const hud = document.getElementById("hud");

let score = 0;
let speed = 6;
let frame = 0;
let gameOver = false;
let shake = 0;

const player = {
  x:120,
  y:340,
  w:40,
  h:40,
  vy:0,
  gravity:0.7,
  jump:-12,
  grounded:true,
  angle:0
};

let obstacles = [];
let particles = [];

const keys = {};

document.addEventListener("keydown", e=>{
  keys[e.code]=true;
  if(e.code==="Space" && player.grounded){
    player.vy = player.jump;
    spawnParticles();
  }
});

document.addEventListener("keyup", e=>keys[e.code]=false);

canvas.addEventListener("click", ()=>{
  if(gameOver) location.reload();
});

function spawnObstacle(){
  obstacles.push({
    x:canvas.width+20,
    y:360,
    w:30+Math.random()*40,
    h:30+Math.random()*60
  });
}

function spawnParticles(){
  for(let i=0;i<8;i++){
    particles.push({
      x:player.x+20,
      y:player.y+20,
      vx:(Math.random()-0.5)*4,
      vy:(Math.random()-0.5)*4,
      life:30
    });
  }
}

function drawPlayer(){
  ctx.save();
  ctx.translate(player.x+20, player.y+20);

  if(!player.grounded) player.angle += 0.18;
  else player.angle *= 0.8;

  ctx.rotate(player.angle);

  // glow
  ctx.shadowColor="#00f6ff";
  ctx.shadowBlur=15;

  let g = ctx.createLinearGradient(-20,-20,20,20);
  g.addColorStop(0,"#00f6ff");
  g.addColorStop(1,"#0066ff");

  ctx.fillStyle=g;
  ctx.fillRect(-20,-20,40,40);

  ctx.restore();
}

function drawObstacles(){
  obstacles.forEach(o=>{
    ctx.shadowColor="#ff0044";
    ctx.shadowBlur=15;
    ctx.fillStyle="#ff2a6d";
    ctx.fillRect(o.x,o.y,o.w,o.h);
  });
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.fillStyle="rgba(0,255,255,0.8)";
    ctx.fillRect(p.x,p.y,3,3);
  });
}

function updateParticles(){
  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;
    p.life--;
  });
  particles = particles.filter(p=>p.life>0);
}

function updatePlayer(){
  player.vy += player.gravity;
  player.y += player.vy;

  if(player.y>=340){
    player.y=340;
    player.vy=0;
    player.grounded=true;
  } else player.grounded=false;

  if(player.y<0) player.y=0;
}

function updateObstacles(){
  obstacles.forEach(o=>o.x-=speed);

  obstacles.forEach(o=>{
    if(
      player.x < o.x+o.w &&
      player.x+40 > o.x &&
      player.y < o.y+o.h &&
      player.y+40 > o.y
    ){
      gameOver=true;
      shake=20;
    }
  });

  obstacles = obstacles.filter(o=>o.x>-50);
}

function drawGround(){
  ctx.fillStyle="#0a0f1f";
  ctx.fillRect(0,380,canvas.width,70);
}

function updateHUD(){
  hud.textContent=`Scor: ${score} | Mod: Cub`;
}

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(shake>0){
    ctx.save();
    ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
    shake--;
  }

  if(!gameOver){
    frame++;
    score++;

    if(frame%80===0) spawnObstacle();
    if(frame%500===0) speed+=0.3;

    updatePlayer();
    updateObstacles();
    updateParticles();

    drawGround();
    drawObstacles();
    drawParticles();
    drawPlayer();

    updateHUD();

    requestAnimationFrame(loop);
  } else {
    ctx.fillStyle="white";
    ctx.font="40px Arial";
    ctx.fillText("GAME OVER",320,200);
    ctx.font="20px Arial";
    ctx.fillText("Click pentru restart",320,240);
  }

  if(shake>0) ctx.restore();
}

loop();
</script>

</body>
</html>
